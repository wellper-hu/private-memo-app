name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.16.0'
        
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
    
    - name: Prepare project
      run: |
        # Create basic files if missing
        if [ ! -f "pubspec.yaml" ]; then
          echo "Creating basic Flutter project"
          echo 'name: app' > pubspec.yaml
          echo 'environment: {sdk: ">=3.0.0 <4.0.0"}' >> pubspec.yaml
          echo 'dependencies: {flutter: {sdk: flutter}}' >> pubspec.yaml
          mkdir -p lib
          echo 'void main() {}' > lib/main.dart
        fi
        
        # Create Android directory
        mkdir -p android/app/src/main/res
        
        # Set gradlew permissions
        if [ -f "android/gradlew" ]; then
          chmod +x android/gradlew
        fi
    
    - name: Build APK
      run: |
        flutter pub get
        flutter build apk --release
        
        # Check result
        if [ -f "build/app/outputs/flutter-apk/app-release.apk" ]; then
          echo "BUILD SUCCESS"
          ls -lh build/app/outputs/flutter-apk/app-release.apk
        else
          echo "BUILD FAILED - No APK found"
          exit 1
        fi
    
    - name: Upload APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: app-apk
        path: build/app/outputs/flutter-apk/app-release.apk

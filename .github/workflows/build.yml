name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
      
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.16.0'
        channel: 'stable'
        
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        
    - name: Install dependencies
      run: |
        echo "Installing Flutter dependencies..."
        flutter pub get
        
    - name: Debug project structure
      run: |
        echo "=== Project Structure Debug ==="
        echo "Current directory: $(pwd)"
        echo ""
        echo "Listing all files:"
        find . -type f -name "*.dart" -o -name "pubspec.*" -o -name "gradlew" | head -20
        echo ""
        echo "Checking Flutter project:"
        if [ -f "pubspec.yaml" ]; then
          echo "✅ pubspec.yaml found"
          echo "Project name: $(grep 'name:' pubspec.yaml | head -1)"
        else
          echo "❌ pubspec.yaml not found"
        fi
        echo ""
        echo "Checking Android directory:"
        if [ -d "android" ]; then
          echo "✅ android directory exists"
          ls -la android/
          echo ""
          echo "Checking gradlew:"
          if [ -f "android/gradlew" ]; then
            echo "✅ gradlew found"
            chmod +x android/gradlew
            echo "Permissions set:"
            ls -la android/gradlew
          else
            echo "❌ gradlew not found in android/"
            echo "Searching for gradlew..."
            find . -name "gradlew" -type f
          fi
        else
          echo "❌ android directory not found"
          echo "Creating basic Android structure..."
          mkdir -p android/app/src/main/res
        fi
        
    - name: Build APK
      run: |
        echo "=== Building APK ==="
        echo "Flutter doctor:"
        flutter doctor -v
        echo ""
        echo "Building APK with debug info..."
        flutter build apk --release --verbose 2>&1 | tail -100
        echo ""
        echo "Checking build output:"
        if [ -d "build/app/outputs/flutter-apk" ]; then
          echo "✅ Build output directory exists"
          ls -la build/app/outputs/flutter-apk/
          echo ""
          echo "APK file:"
          find build/app/outputs/flutter-apk -name "*.apk" -type f
        else
          echo "❌ Build output directory not found"
          echo "Build failed. Check logs above."
          exit 1
        fi
        
    - name: Upload APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: private-memo-app-apk
        path: build/app/outputs/flutter-apk/*.apk
        retention-days: 7
        
    - name: Upload build logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-logs
        path: |
          flutter.log
        retention-days: 7
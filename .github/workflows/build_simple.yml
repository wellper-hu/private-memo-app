name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.16.0'
        channel: 'stable'
        
    - name: Install dependencies
      run: flutter pub get
      
    - name: Debug - List files
      run: |
        echo "Current directory:"
        pwd
        echo "Listing files:"
        ls -la
        echo "Checking android directory:"
        if [ -d "android" ]; then
          ls -la android/
          echo "Checking gradlew:"
          if [ -f "android/gradlew" ]; then
            echo "gradlew exists, setting permissions..."
            chmod +x android/gradlew
            ls -la android/gradlew
          else
            echo "ERROR: gradlew not found in android/"
            echo "Searching for gradlew:"
            find . -name "gradlew" -type f 2>/dev/null
          fi
        else
          echo "ERROR: android directory not found"
        fi
        
    - name: Build APK
      run: |
        echo "Building APK..."
        flutter build apk --release --verbose
        echo "Build completed, checking output:"
        if [ -d "build/app/outputs/flutter-apk" ]; then
          ls -la build/app/outputs/flutter-apk/
        else
          echo "ERROR: APK output directory not found"
        fi
        
    - name: Upload APK artifact
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: private-memo-app-apk
        path: build/app/outputs/flutter-apk/app-release.apk
        retention-days: 7
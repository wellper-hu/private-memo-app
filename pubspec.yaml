name: private_memo
description: 私密备忘录 - 超高安全性个人信息管理应用

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # 状态管理
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5
  
  # 数据库和加密
  sqflite_sqlcipher: ^2.1.0
  encrypt: ^5.0.1
  crypto: ^3.0.3
  
  # 本地存储
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0
  
  # UI组件
  cupertino_icons: ^1.0.6
  flutter_slidable: ^3.0.1
  flutter_staggered_grid_view: ^0.7.0
  shimmer: ^3.0.0
  flutter_animate: ^4.3.0
  
  # 日期时间处理
  intl: ^0.18.1
  lunar: ^1.0.0
  
  # 图片和OCR
  image_picker: ^1.0.7
  google_mlkit_text_recognition: ^0.11.0
  path_provider: ^2.1.1
  permission_handler: ^11.0.1
  
  # 通知
  flutter_local_notifications: ^16.3.0
  timezone: ^0.9.2
  
  # 生物识别
  local_auth: ^2.1.8
  
  # 其他
  share_plus: ^7.2.1
  path: ^1.8.3
  uuid: ^4.2.1
  json_annotation: ^4.8.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.7
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
  
  fonts:
    - family: NotoSansSC
      fonts:
        - asset: assets/fonts/NotoSansSC-Regular.otf
        - asset: assets/fonts/NotoSansSC-Bold.otf
          weight: 700
